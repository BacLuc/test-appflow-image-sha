env:
  KUBECONFIG: /tmp/github-ci.kubeconfig
inputs:
  IMGNAME:
    required: true
  REGISTRY:
    required: true
  TARGET:
    required: false
outputs:
  IMAGE_DIGEST:
    description: "Image digest"
    value: ${{ steps.build.outputs.digest }}
name: Build
runs:
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      id: build
      with:
        provenance: false
        push: true
        tags: "${{ inputs.REGISTRY }}/test/${{ inputs.IMGNAME }}"
        target: "${{ inputs.TARGET }}"
  using: composite
