env:
  KUBECONFIG: /tmp/github-ci.kubeconfig
inputs:
  IMGNAME:
    required: true
  REGISTRY:
    required: true
  TARGET:
    required: false
outputs:
  IMAGE_DIGEST:
    description: "Image digest"
    value: ${{ steps.replace_colon.outputs.IMAGE_DIGEST }}
name: Build
runs:
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      id: build
      with:
        load: true
        provenance: false
        tags: "${{ inputs.REGISTRY }}/test/${{ inputs.IMGNAME }}"
        target: "${{ inputs.TARGET }}"
    - run: |
        echo "IMAGE_DIGEST=$(echo -n "${{ steps.build.outputs.digest }}" | sed s/:/@/)" | tr -d "\n"  >> $GITHUB_OUTPUT
      id: replace_colon
      shell: bash
  using: composite
